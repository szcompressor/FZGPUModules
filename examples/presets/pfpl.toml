[pipeline]
# PFPL Preset (SZ-like predictor-based pipeline)
# Fast, relatively high quality scientific floating-point data compressor.
# Topology: Quantizer -> Difference -> Bitshuffle -> RZE
memory_strategy = "PREALLOCATE"

[[stage]]
name = "quant"
type = "Quantizer"
input_type = "float32"
code_type = "uint32"
error_bound = 1e-3
error_bound_mode = "REL"
quant_radius = 32768
outlier_capacity = 0.1
zigzag_codes = true

[[stage]]
name = "diff"
type = "Difference"
input_type = "int32"
output_type = "uint32"
chunk_size = 16384
inputs = [{from = "quant", port = "codes"}]

[[stage]]
name = "bshuf"
type = "Bitshuffle"
element_width = 2
block_size = 16384
inputs = [{from = "diff", port = "output"}]

[[stage]]
name = "rze"
type = "RZE"
levels = 4
inputs = [{from = "bshuf", port = "output"}]
