name: Build Check

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel any in-progress run on the same PR
concurrency:
  group: build-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  compile-only:
    name: Compile (CPU-only)
    runs-on: ubuntu-24.04
    # Uses the published FZGPUModules image
    container: ghcr.io/szcompressor/fzgpumodules:latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure
        run: |
          cmake -S . -B build/check \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_TESTING=OFF \
            -DBUILD_EXAMPLES=OFF \
            -DBUILD_PROFILING=OFF \
            -DCMAKE_CUDA_ARCHITECTURES=native

      - name: Build (library + CLI only)
        run: cmake --build build/check --target fzgmod fzgmod-cli
